<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | FRSMODERN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="apapun.css" />
    <style>
      section {
        padding: 80px 20px;
      }
      .contact-container {
        max-width: 600px;
        margin: 0 auto;
        text-align: center;
      }
      .form-group {
        margin-bottom: 20px;
        text-align: left;
      }
      input,
      textarea {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        font-family: 'Poppins';
      }
      .social-links a {
        font-size: 2rem;
        color: white;
        margin: 0 15px;
        transition: 0.3s;
      }
      .social-links a:hover {
        color: #ff4757;
        transform: translateY(-5px);
      }
    </style>
  </head>
  <body>
    <div id="progress-bar"></div>

    <header>
      <div class="nav-container">
        <div class="logo">FRSMODERN<span>.</span></div>
        <nav>
          <ul>
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="about.html" class="nav-link">About Me</a></li>
            <!-- Class active berada di Contact -->
            <li><a href="contact.html" class="nav-link active">Contact</a></li>
            <li><a href="others.html" class="nav-link">Others</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <!-- Section 1: Intro Contact -->
      <section class="scroll-reveal active">
        <div class="contact-container">
          <h1 style="font-family: 'Orbitron'; font-size: 2.5rem">GET IN <span class="gradient-text">TOUCH</span></h1>
          <p>Punya ide proyek, pertanyaan, atau sekadar ingin menyapa? Jangan ragu untuk menghubungi saya!</p>
        </div>
      </section>

      <!-- Section 2: Contact Form -->
      <section class="scroll-reveal">
        <div class="contact-container">
          <form action="#">
            <div class="form-group">
              <label>Name</label>
              <input type="text" placeholder="Masukkan nama kamu..." required />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" placeholder="Masukkan email aktif..." required />
            </div>
            <div class="form-group">
              <label>Message</label>
              <textarea rows="5" placeholder="Tulis pesanmu di sini..." required></textarea>
            </div>
            <button type="submit" class="btn-lanyard" style="width: 100%; border: none; cursor: pointer">Kirim Pesan <i class="fas fa-paper-plane"></i></button>
          </form>
        </div>
      </section>

      <!-- Section 3: Social Media & Location -->
      <section class="scroll-reveal">
        <div class="contact-container">
          <h2>CONNECT WITH <span class="gradient-text">ME</span></h2>
          <p>Atau temukan saya di platform sosial media berikut:</p>
          <div class="social-links" style="margin-top: 30px">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-linkedin"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
          </div>
          <div style="margin-top: 40px">
            <h3><i class="fas fa-map-marker-alt"></i> Location</h3>
            <p>Magelang, Central Java, Indonesia.</p>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
